name: Deploy frontend (khansoft.az)

# master-ə hər push-da serverdə `deploy.sh` işə düşür: git pull → npm ci →
# build → systemctl restart fanus-frontend. Frontend /var/www/fanusopcfrontend-də
# systemd servis kimi (Node, port 3000) işləyir; nginx khansoft.az + panel
# subdomenlərini ona proxy edir.
on:
  push:
    branches: [master]
  workflow_dispatch: {}

# Eyni anda iki deploy getməsin; işləyəni yarıda kəsmə (build tam bitsin).
concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes "$USER@$HOST" \
            'bash /var/www/fanusopcfrontend/deploy.sh'
